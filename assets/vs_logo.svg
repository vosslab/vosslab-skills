  <title
     id="title1">V in front of S blue logo</title>
  <desc
     id="desc1">A stylized V letter in front of an S letter with a light-to-medium blue fill, subtle white glowing outline, and black background.</desc>
  <defs
     id="defs4">
    <linearGradient
       id="linearGradient8"
       x1="0"
       y1="140"
       x2="0"
       y2="1060"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#9ee7ff"
         id="stop6"
         style="stop-color:#9ee7ff;stop-opacity:0.80000001;" />
      <stop
         offset="0.44999999"
         stop-color="#4fbfff"
         id="stop7"
         style="stop-color:#4fbfff;stop-opacity:0.80000001;" />
      <stop
         offset="1"
         stop-color="#1f74d6"
         id="stop8"
         style="stop-color:#1f74d6;stop-opacity:0.80000001;" />
    </linearGradient>
    <linearGradient
       id="blueGradient"
       x1="0"
       y1="140"
       x2="0"
       y2="1060"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         stop-color="#9ee7ff"
         id="stop1" />
      <stop
         offset="45%"
         stop-color="#4fbfff"
         id="stop2" />
      <stop
         offset="100%"
         stop-color="#1f74d6"
         id="stop3" />
    </linearGradient>
    <filter
       id="whiteGlow"
       x="-0.063489184"
       y="-0.057599328"
       width="1.1269784"
       height="1.1151987">
      <feGaussianBlur
         stdDeviation="7"
         result="softGlow"
         id="feGaussianBlur3" />
      <feFlood
         flood-color="#ffffff"
         flood-opacity="0.55"
         result="glowColor"
         id="feFlood3" />
      <feComposite
         in="glowColor"
         in2="softGlow"
         operator="in"
         result="glow"
         id="feComposite3" />
      <feMerge
         id="feMerge4">
        <feMergeNode
           in="glow"
           id="feMergeNode3" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode4" />
      </feMerge>
    </filter>
    <style
       id="style4">
      .letter {
        font-family: Arial Black, Impact, Helvetica, sans-serif;
        font-weight: 900;
        text-anchor: middle;
        fill: url(#blueGradient);
        stroke: #ffffff;
        stroke-width: 20;
        stroke-linejoin: round;
        paint-order: stroke fill;
        filter: url(#whiteGlow);
      }
      .behind {
        opacity: 0.96;
      }
      .front {
        opacity: 1;
      }
    </style>
    <linearGradient
       inkscape:collect="always"
